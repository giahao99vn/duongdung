<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dương Dung | Bao bì Công nghiệp & Xử lý Môi trường</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <nav class="bg-white shadow-md p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a href="#" class="text-3xl font-black text-blue-900 tracking-tighter">DUONGDUNG</a>
            <ul class="hidden md:flex space-x-8 font-medium text-gray-600">
                <li class="hover:text-blue-600 cursor-pointer transition">Trang chủ</li>
                <li class="hover:text-blue-600 cursor-pointer transition">Sản phẩm</li>
                <li class="hover:text-blue-600 cursor-pointer transition">Lĩnh vực hoạt động</li>
                <li class="hover:text-blue-600 cursor-pointer transition">Liên hệ</li>
            </ul>
            <button class="bg-blue-600 text-white px-6 py-2.5 rounded-md hover:bg-blue-700 transition font-semibold shadow-md">Nhận Báo Giá</button>
        </div>
    </nav>

    <section class="relative bg-slate-900 text-white h-[85vh] flex items-center justify-center">
        <div class="absolute inset-0 bg-gradient-to-r from-blue-900 to-slate-900 opacity-90"></div>
        
        <div class="relative z-10 text-center px-4 max-w-4xl mx-auto">
            <h1 class="text-5xl md:text-6xl font-extrabold mb-6 leading-tight">Giải Pháp Bao Bì Công Nghiệp Toàn Diện</h1>
            <p class="text-lg md:text-xl mb-10 text-gray-300 font-light">Gần 20 năm kinh nghiệm cung cấp Thùng phuy sắt, nhựa và Bồn IBC 1000L chất lượng cao. Chuẩn mực An Toàn - Bền Vững - Tiết Kiệm.</p>
            <div class="flex flex-col sm:flex-row justify-center space-y-4 sm:space-y-0 sm:space-x-4">
                <button class="bg-blue-500 hover:bg-blue-400 px-8 py-3.5 rounded-md text-lg font-bold transition shadow-lg text-white">Xem Sản Phẩm</button>
                <button class="bg-transparent border-2 border-white hover:bg-white hover:text-blue-900 px-8 py-3.5 rounded-md text-lg font-bold transition">Gọi Hotline Ngay</button>
            </div>
        </div>
    </section>

</body>
</html>
